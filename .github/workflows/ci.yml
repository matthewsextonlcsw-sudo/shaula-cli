name: CI

on:
  push:
    branches: [main]
  pull_request:

# The honesty gate must prove out on every push, on every OS, with no key.
jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (with dev + provider extras)
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      - name: Smoke — offline run, no key (the moat must hold)
        run: |
          shaula version
          shaula doctor
          shaula author "draft a weekly blog workflow" --stub
          shaula research "sleep hygiene basics" --stub
        shell: bash

  installers:
    name: installer scripts parse-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Check install.sh syntax (POSIX)
        if: runner.os == 'Linux'
        run: bash -n scripts/install.sh
      - name: Check install.ps1 syntax (PowerShell parser)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errs = $null; $toks = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "scripts/install.ps1", [ref]$toks, [ref]$errs) | Out-Null
          if ($errs) { $errs | ForEach-Object { Write-Error $_.Message }; exit 1 }
          Write-Host "install.ps1 parses clean"

  build:
    name: build wheel + install from it
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: python -m pip install build && python -m build
      - name: Install the built wheel into a clean venv and run it
        run: |
          python -m venv /tmp/clean
          /tmp/clean/bin/python -m pip install dist/*.whl
          /tmp/clean/bin/shaula version
          /tmp/clean/bin/shaula doctor
          /tmp/clean/bin/shaula research "offline check" --stub
      - uses: actions/upload-artifact@v4
        with:
          name: shaula-dist
          path: dist/*
